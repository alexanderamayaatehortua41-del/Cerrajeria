<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Cerrajería</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .chat-container {
            width: 100%;
            max-width: 400px;
            height: 550px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: #34495e;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
        }

        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 14px;
            max-width: 80%;
        }

        .bot-message {
            background: #f1f0f0;
            color: #333;
            align-self: flex-start;
        }

        .user-message {
            background: #3498db;
            color: white;
            align-self: flex-end;
        }

        .chat-input {
            display: flex;
            padding: 15px;
            border-top: 1px solid #eee;
        }

        #user-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
        }

        #send-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 0 15px;
            margin-left: 5px;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">Asistente de Cerrajería</div>
        <div id="chat-box" class="chat-box">
            <div class="message bot-message">¡Hola! ¿Deseas saber el precio del cambio de clave?</div>
        </div>
        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Escribe aquí..." autocomplete="off">
            <button id="send-btn">Enviar</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        function sendMessage() {
            const text = userInput.value.trim();
            if (text !== "") {
                appendMessage(text, 'user-message');
                userInput.value = "";

                setTimeout(() => {
                    const response = getBotResponse(text);
                    appendMessage(response, 'bot-message');
                }, 500);
            }
        }

        function appendMessage(text, className) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', className);
            messageDiv.innerText = text;
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function getBotResponse(input) {
            const query = input.toLowerCase();

            // Lógica principal: pregunta inicial
            if (query.includes("vale") || query.includes("cuánto") || query.includes("precio")) {
                if (query.includes("cambio") || query.includes("clave")) {
                    return "¿El cambio de clave está con tornillo o con soldadura?";
                }
            }

            // Respuesta específica para TORNILLO
            if (query.includes("tornillo")) {
                return "Vale 45,000.";
            }

            // Respuesta específica para SOLDADURA
            if (query.includes("soldadura")) {
                return "Vale 60,000.";
            }

            return "Por favor, indícame si es con tornillo o soldadura para darte el precio.";
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>

</body>
</html>
